services:
  - type: web
    name: fu-donation-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0

  - type: static_site
    name: fu-donation-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
